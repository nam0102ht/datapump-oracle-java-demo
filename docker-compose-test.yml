services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-pump-test-db
    environment:
      ORACLE_PASSWORD: SysPassword123
      APP_USER: APP_USER
      APP_USER_PASSWORD: AppPass123
    ports:
      - "1521:1521"
    volumes:
      - ./docker/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s