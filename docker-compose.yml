services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-pump-db
    environment:
      ORACLE_PASSWORD: SysPassword123
      APP_USER: APP_USER
      APP_USER_PASSWORD: AppPass123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  app:
    build: .
    container_name: oracle-pump-app
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: APP_USER
      SPRING_DATASOURCE_PASSWORD: AppPass123
    ports:
      - "8080:8080"

volumes:
  oracle-data: